<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Whisper ASR Test</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 6px; border-radius: 6px; border: none; }
    #startBtn  { background: #4CAF50; color: white; }
    #stopBtn   { background: #f44336; color: white; }
    #status    { margin: 16px 0; color: #555; font-style: italic; }
    #result    { margin-top: 20px; padding: 16px; background: #f5f5f5; border-radius: 8px;
                 min-height: 60px; font-size: 18px; white-space: pre-wrap; }
    #history   { margin-top: 30px; }
    .entry     { padding: 8px 0; border-bottom: 1px solid #ddd; }
    .entry span { color: #888; font-size: 12px; }
  </style>
</head>
<body>
  <h2>Whisper ASR 测试</h2>
  <button id="startBtn">开始录音</button>
  <button id="stopBtn" disabled>停止 &amp; 识别</button>
  <div id="status">等待录音...</div>
  <div id="result">识别结果会显示在这里</div>
  <div id="history"><h3>历史记录</h3></div>

  <script>
    let mediaRecorder, chunks = [];
    const startBtn = document.getElementById("startBtn");
    const stopBtn  = document.getElementById("stopBtn");
    const status   = document.getElementById("status");
    const result   = document.getElementById("result");
    const history  = document.getElementById("history");

    startBtn.onclick = async () => {
      chunks = [];
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.onstop = sendAudio;
      mediaRecorder.start();
      status.textContent = "录音中...";
      startBtn.disabled = true;
      stopBtn.disabled  = false;
    };

    stopBtn.onclick = () => {
      mediaRecorder.stop();
      status.textContent = "识别中，请稍候...";
      stopBtn.disabled  = true;
      startBtn.disabled = false;
    };

    async function sendAudio() {
      const blob = new Blob(chunks, { type: "audio/webm" });
      const form = new FormData();
      form.append("audio", blob, "recording.webm");

      try {
        const res  = await fetch("/transcribe", { method: "POST", body: form });
        const data = await res.json();
        const text = data.text || data.error || "(空)";
        result.textContent = text;
        status.textContent = "识别完成！";

        // Append to history
        const entry = document.createElement("div");
        entry.className = "entry";
        entry.innerHTML = `<span>${new Date().toLocaleTimeString()}</span><br>${text}`;
        history.appendChild(entry);
      } catch (err) {
        status.textContent = "请求失败: " + err;
      }
    }
  </script>
</body>
</html>
